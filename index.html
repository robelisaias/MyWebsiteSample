<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Design Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div>
        <h1>My Website</h1>
        </div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
<main>
<article>
    <span>Web Design</span>
    <img src="web-design-1.jpg" alt="Web design project preview"/>
    <h2>Creative Portfolio</h2>
    <p>A modern and responsive website design</p>
    <button>View Project</button>
</article>
   
<section>
<h2>Contact Me</h2>
    <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required   />
        
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your Email" required   />

        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
            <option value="" disabled selected>-- Select a Subject</option>
            <option value="general">General Inquiry</option>
            <option value="project">Project Request</option>
            <option value="collaboration">Collaboration</option>
            <option value="other">Other</option>
        </select>

        <label for="message">Message</label>
        <textarea name="message" id="message" placeholder="Write your message here..." required></textarea>

        <button type="submit">Send Message</button>


    </form>
</section>
</main>
</body>
</html>
